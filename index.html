<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="One page mariage - HTML5, Pico CSS, fullPage.js, PHPMailer">
    <title>Mariage - One Page</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullpage.js@4.0.37/dist/fullpage.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <main id="fullpage">
        <section class="section hero" data-anchor="accueil">
            <div class="container">
                <h1>Julie & Antoine</h1>
                <p>Nous nous marions le 12 juin 2027</p>
                <a href="#infos" role="button">Voir les infos</a>
            </div>
        </section>

        <section class="section" data-anchor="infos" id="infos">
            <div class="container">
                <h2>Informations</h2>
                <p>Cérémonie à 15h00 - Domaine des Oliviers.</p>
                <p>Merci de confirmer votre présence.</p>
            </div>
        </section>

        <section class="section" data-anchor="contact">
            <div class="container">
                <h2>Contact</h2>
                <form action="php/send-mail.php" method="post">
                    <label>
                        Nom
                        <input type="text" name="name" required>
                    </label>

                    <label>
                        Email
                        <input type="email" name="email" required>
                    </label>

                    <label>
                        Message
                        <textarea name="message" rows="5" required></textarea>
                    </label>

                    <button type="submit">Envoyer</button>
                </form>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/fullpage.js@4.0.37/dist/fullpage.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
